services:
  postgres:
    image: postgres:16-alpine
    container_name: neyasandi-postgres
    environment:
      POSTGRES_DB: neyasandi
      POSTGRES_USER: postgres

    volumes:
    - pgdata:/var/lib/postgresql/data  

  redis:
    image: redis:7-alpine
    container_name: neyasandi-redis

    

  rabbitMq:
    image: rabbitmq:3-management-alpine
    container_name: neyasandi-rabbitMq



volumes:
  pgdata: